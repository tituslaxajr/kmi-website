project_id = "kmi-website"

[api]
enabled = true
schemas = ["public", "graphql_public"]

[db]
major_version = 17

[auth]
enabled = true
site_url = "https://kmi-website-nine.vercel.app"
additional_redirect_urls = [
  "http://localhost:3000/auth/callback",
  "https://kmi-website-nine.vercel.app/auth/callback",
  "https://*.vercel.app/auth/callback",
]

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1m"
otp_length = 8
otp_expiry = 3600

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[storage]
enabled = true
file_size_limit = "12MiB"

[storage.vector]
enabled = false
